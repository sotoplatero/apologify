<!doctype html><html><head><meta charset="utf-8"><style>
  :root { --w: {{WIDTH}}; --h: {{HEIGHT}}; }
  @font-face { font-family:"Courier Prime"; src:local("Courier Prime"), local("Courier New"), url("_fonts/courier-prime.woff2") format("woff2"); font-display:swap; }
  * { margin:0; padding:0; box-sizing:border-box; }
  .frame {
    width:var(--w); height:var(--h); overflow:hidden;
    background:radial-gradient(130% 100% at 50% 0%, #f5ecd6, #eadfc2 70%, #e4d8b8 100%);
    background-color:#eadfc2;
    font-family:"Courier Prime", "Courier New", Courier, monospace; color:#3d3421;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:72px 64px;
  }
  .sheet {
    width:100%;
    background-color:#f6efdc;
    background-image:
      repeating-linear-gradient(180deg, transparent 0, transparent 31px, rgba(120,100,60,0.035) 32px);
    box-shadow:0 24px 55px -28px rgba(80,65,35,0.5);
    border:1px solid #e3d6b4;
    padding:64px 56px;
  }
  .kicker { display:block; margin-bottom:28px; font-size:14px; letter-spacing:0.3em; text-transform:uppercase; color:#8a7c5a; }
  .title { font-size:40px; font-weight:700; letter-spacing:-0.01em; line-height:1.3; color:#332b1c; margin-bottom:24px; text-wrap:balance; }
  .heading { font-size:24px; color:#4a4029; margin-bottom:24px; }
  .body p { font-size:23px; line-height:1.85; color:#3d3421; margin-bottom:20px; text-shadow:0.35px 0 0 rgba(50,40,20,0.18); }
  .sender { margin-top:40px; color:#4a4029; font-size:24px; }
  .actions-rule { margin-top:44px; padding-top:28px; border-top:1px dashed #cbb98a; }
  .made { margin-top:32px; text-align:center; font-size:14px; letter-spacing:0.05em; color:#8a7c5a; }
</style></head><body>
  <div class="frame">
    <div class="sheet">
      <span class="kicker">&gt; typed with care</span>
      <div class="title">{{TITLE}}</div>
      {{HEADING}}
      <div class="body">{{PARAGRAPHS}}</div>
      {{SENDER}}
      <div class="actions-rule"></div>
    </div>
    <div class="made">Made on apologify.com — write your own</div>
  </div>
</body></html>
