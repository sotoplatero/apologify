<!doctype html><html><head><meta charset="utf-8"><style>
  :root { --w: {{WIDTH}}; --h: {{HEIGHT}}; }
  @font-face { font-family:"Fraunces"; src:local("Fraunces"), url("_fonts/fraunces.woff2") format("woff2"); font-display:swap; }
  @font-face { font-family:"Dancing"; src:local("Dancing Script"), url("_fonts/dancing.woff2") format("woff2"); font-display:swap; }
  * { margin:0; padding:0; box-sizing:border-box; }
  .frame {
    width:var(--w); height:var(--h); overflow:hidden; position:relative;
    background:#fbf7f4;
    font-family:"Fraunces", "Lora", Georgia, serif; color:#4d3d46;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:72px 60px;
  }
  .wash { position:absolute; border-radius:50%; filter:blur(60px); pointer-events:none; }
  .w-rose  { width:640px; height:640px; top:-14%; left:-12%; background:radial-gradient(circle at 40% 40%, rgba(211,150,168,0.55), rgba(211,150,168,0) 70%); }
  .w-sage  { width:560px; height:560px; bottom:-16%; right:-10%; background:radial-gradient(circle at 50% 50%, rgba(158,184,158,0.5), rgba(158,184,158,0) 70%); }
  .w-slate { width:500px; height:500px; top:28%; right:14%; background:radial-gradient(circle at 50% 50%, rgba(122,146,176,0.4), rgba(122,146,176,0) 70%); }
  .w-rose2 { width:420px; height:420px; bottom:6%; left:8%; background:radial-gradient(circle at 50% 50%, rgba(224,178,190,0.42), rgba(224,178,190,0) 70%); }
  .paper {
    position:relative; width:100%;
    background:radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.95) 0%, rgba(253,249,248,0.86) 100%);
    border:1px solid rgba(231,211,218,0.8); border-radius:10px;
    box-shadow:0 24px 70px -26px rgba(150,103,123,0.45);
    padding:64px 56px; text-align:center;
  }
  .eyebrow { font-size:13px; letter-spacing:0.4em; text-transform:uppercase; color:#a2778a; margin-bottom:14px; }
  .title { font-family:"Fraunces", Georgia, serif; font-weight:500; font-size:44px; line-height:1.2; color:#5c4451; text-wrap:balance; }
  .rule { width:72px; height:2px; margin:22px auto 0; background:linear-gradient(90deg, transparent, #cbb0bb, transparent); }
  .heading { font-size:24px; font-style:italic; color:#7a5c69; margin:28px 0; }
  .body { font-family:"Lora", Georgia, serif; }
  .body p { font-size:25px; line-height:1.85; color:#4d3d46; margin-bottom:20px; }
  .sender { margin-top:40px; text-align:right; font-family:"Dancing", cursive; font-size:52px; color:#96677b; }
  .made { margin-top:32px; text-align:center; font-size:14px; letter-spacing:0.05em; color:#a2778a; }
</style></head><body>
  <div class="frame">
    <div class="wash w-rose"></div>
    <div class="wash w-sage"></div>
    <div class="wash w-slate"></div>
    <div class="wash w-rose2"></div>
    <div class="paper">
      <div class="eyebrow">An apology</div>
      <div class="title">{{TITLE}}</div>
      <div class="rule"></div>
      {{HEADING}}
      <div class="body">{{PARAGRAPHS}}</div>
      {{SENDER}}
    </div>
    <div class="made">Made on apologify.com — write your own</div>
  </div>
</body></html>
