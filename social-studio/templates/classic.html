<!doctype html><html><head><meta charset="utf-8"><style>
  :root { --w: {{WIDTH}}; --h: {{HEIGHT}}; }
  @font-face { font-family:"Fraunces"; src:local("Fraunces"), url("_fonts/fraunces.woff2") format("woff2"); font-display:swap; }
  @font-face { font-family:"Dancing"; src:local("Dancing Script"), url("_fonts/dancing.woff2") format("woff2"); font-display:swap; }
  * { margin:0; padding:0; box-sizing:border-box; }
  .frame {
    width:var(--w); height:var(--h); overflow:hidden;
    background:radial-gradient(circle at 30% 15%, #fdf6ec, #f0e6d2);
    font-family:"Fraunces", Georgia, serif; color:#3a2f22;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:64px 56px;
  }
  .kicker { font-size:13px; letter-spacing:0.35em; text-transform:uppercase; color:#a9854f; margin-bottom:28px; }
  .card {
    width:100%; background:#fffdf8; border:1px solid #ece0c8;
    box-shadow:0 24px 70px -24px rgba(120,90,50,0.4); padding:64px 56px;
  }
  .eyebrow { font-size:12px; letter-spacing:0.4em; text-transform:uppercase; color:#b3925a; text-align:center; margin-bottom:14px; }
  .title { font-size:46px; font-weight:600; line-height:1.15; text-align:center; text-wrap:balance; }
  .rule { width:64px; height:1px; background:#cdb486; margin:24px auto 0; }
  .heading { font-size:26px; color:#5a4a36; margin:34px 0 26px; }
  .body p { font-size:25px; line-height:1.85; color:#4a3d2c; margin-bottom:22px; }
  .sender { margin-top:52px; text-align:right; font-family:"Dancing", cursive; font-size:52px; color:#7a5c34; }
  .made { margin-top:32px; font-size:14px; letter-spacing:0.05em; color:#b3925a; text-align:center; }
</style></head><body>
  <div class="frame">
    <div class="kicker">✷ Apologify ✷</div>
    <div class="card">
      <div class="eyebrow">An apology</div>
      <div class="title">{{TITLE}}</div>
      <div class="rule"></div>
      {{HEADING}}
      <div class="body">{{PARAGRAPHS}}</div>
      {{SENDER}}
    </div>
    <div class="made">Made on apologify.com — write your own</div>
  </div>
</body></html>
