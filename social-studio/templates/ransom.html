<!doctype html><html><head><meta charset="utf-8"><style>
  :root { --w: {{WIDTH}}; --h: {{HEIGHT}}; }
  /* "Ransom" by Divide By Zero (fonts.tom7.com) — free for commercial use. Bundled ttf, embedded offline. */
  @font-face { font-family:"Ransom"; src:local("Ransom"), url("_fonts/ransom.ttf") format("truetype"); font-display:swap; }
  @font-face { font-family:"Dancing"; src:local("Dancing Script"), url("_fonts/dancing.woff2") format("woff2"); font-display:swap; }
  * { margin:0; padding:0; box-sizing:border-box; }
  .frame {
    width:var(--w); height:var(--h); overflow:hidden;
    background:#d9d2c5;
    font-family:"Courier New", Courier, monospace; color:#171717;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:72px 60px;
  }
  .kicker { font-size:14px; text-transform:uppercase; letter-spacing:0.4em; color:#525252; margin-bottom:28px; text-align:center; }
  .title-wrap { display:flex; justify-content:center; margin-bottom:40px; max-width:900px; }
  .title {
    font-family:"Ransom", Impact, "Arial Black", sans-serif;
    font-size:76px; line-height:1.25;
    text-align:center; text-wrap:balance;
    color:#171717;
    text-shadow:1px 2px 3px rgba(0,0,0,0.28);
  }
  .card {
    width:100%; background:rgba(255,255,255,0.85); border:1px solid #a3a3a3;
    padding:40px 44px; box-shadow:0 2px 6px rgba(0,0,0,0.08);
  }
  .heading { font-size:22px; font-weight:700; color:#171717; margin-bottom:16px; }
  .body p { font-size:21px; line-height:1.7; color:#262626; margin-bottom:14px; }
  .sender { margin-top:28px; text-align:right; font-family:"Dancing", cursive; font-size:32px; color:#171717; }
  .made { margin-top:32px; text-align:center; font-size:14px; color:#525252; }
</style></head><body>
  <div class="frame">
    <div class="kicker">Apologify · an apology</div>
    <div class="title-wrap"><div class="title">{{TITLE}}</div></div>
    <div class="card">
      {{HEADING}}
      <div class="body">{{PARAGRAPHS}}</div>
      {{SENDER}}
    </div>
    <div class="made">Made on apologify.com</div>
  </div>
</body></html>
